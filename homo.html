<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .container {
        display: flex; /* 자식들을 유연하게 배치하겠다고 선언 */
      }
      .content {
        flex-basis: 920px; /* 메인 영역의 예약된 크기 */
        /* 남는 공간이 생기면 더 커져도 좋다는 허락 */
        background-color: rgb(126, 37, 153);
        flex-grow: 1;
      }
      .sidebar {
        flex-basis: 300px; /* 배너 영역의 예약된 크기 */
        background-color: yellow;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <main class="content">메인</main>
      <aside class="sidebar">우축</aside>
    </div>
  </body>
</html>
